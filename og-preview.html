<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }
    body {
      background: #0D1520;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      position: relative;
    }
    .bg-glow {
      position: absolute;
      width: 800px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,212,255,0.07) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(62,207,207,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(62,207,207,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 0 80px;
    }
    .eyebrow {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #00d4ff;
      opacity: 0.8;
    }
    .brand {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #EDF3F7;
      line-height: 1;
    }
    .tagline {
      font-size: 26px;
      font-weight: 400;
      color: #00d4ff;
      letter-spacing: -0.01em;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: rgba(0,212,255,0.4);
    }
    .url {
      font-size: 15px;
      letter-spacing: 0.08em;
      color: rgba(176,196,208,0.5);
    }
    .border-frame {
      position: absolute;
      inset: 24px;
      border: 1px solid rgba(62,207,207,0.12);
      pointer-events: none;
    }
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: rgba(0,212,255,0.4);
      border-style: solid;
    }
    .corner-tl { top: 24px; left: 24px; border-width: 2px 0 0 2px; }
    .corner-tr { top: 24px; right: 24px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 24px; left: 24px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 24px; right: 24px; border-width: 0 2px 2px 0; }
  </style>
</head>
<body>
  <div class="grid-lines"></div>
  <div class="bg-glow"></div>
  <div class="border-frame"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="content">
    <span class="eyebrow">Cobourg · Northumberland County · Ontario</span>
    <div class="brand">Ross &amp; Griffiths Digital</div>
    <div class="tagline">Custom Web Design — Northumberland County, Ontario</div>
    <div class="divider"></div>
    <span class="url">rossgriffithsdigital.com</span>
  </div>
</body>
</html>
